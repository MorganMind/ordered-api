<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New application</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:560px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);">
          <tr>
            <td style="padding:28px 28px 8px 28px;">
              <p style="margin:0;font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#6366f1;">{{ tenant_name }}</p>
              <h1 style="margin:12px 0 0 0;font-size:22px;line-height:1.3;color:#18181b;">New technician application</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 28px 24px 28px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="font-size:15px;line-height:1.6;color:#3f3f46;">
                <tr><td style="padding:6px 0;"><strong>Form</strong></td><td style="padding:6px 0;">{{ form_title }}</td></tr>
                <tr><td style="padding:6px 0;"><strong>Applicant</strong></td><td style="padding:6px 0;">{{ applicant_name }}</td></tr>
                <tr><td style="padding:6px 0;"><strong>Email</strong></td><td style="padding:6px 0;"><a href="mailto:{{ applicant_email }}" style="color:#6366f1;">{{ applicant_email }}</a></td></tr>
                <tr><td style="padding:6px 0;"><strong>Reference</strong></td><td style="padding:6px 0;">{{ reference }}</td></tr>
              </table>
              <p style="margin:20px 0 0 0;font-size:14px;color:#71717a;">Review this application in your operator workspace.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px 28px 28px;border-top:1px solid #e4e4e7;">
              <p style="margin:0;font-size:13px;line-height:1.5;color:#a1a1aa;">Operator notification for {{ tenant_name }}.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
