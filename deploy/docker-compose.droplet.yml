# Run from repo root: docker compose -f deploy/docker-compose.droplet.yml up -d --build
# Requires a .env in the repo root (see .env.example and deploy/DIGITALOCEAN_DROPLET.md).

name: ordered-api

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      PORT: "8000"
    restart: unless-stopped
